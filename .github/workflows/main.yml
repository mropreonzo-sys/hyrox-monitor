name: Hyrox Milano Monitor

on:
  schedule:
    - cron: '0 7,13,19 * * *'   # 3 volte/giorno: 7:00, 13:00, 19:00 UTC (= 9:00, 15:00, 21:00 ora italiana)
  workflow_dispatch:              # puoi anche lanciarlo a mano dalla tab Actions

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installa dipendenze
        run: pip install requests beautifulsoup4

      - name: Debug - mostra file
        run: cat check_hyrox.py

      - name: Debug - testa fetch pagina
        run: |
          python -c "
          import requests, urllib3
          urllib3.disable_warnings()
          headers = {'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36'}
          r = requests.get('https://hyroxitaly.com/it/event/hyrox-rimini-2/', headers=headers, verify=False, timeout=20)
          print('Status code:', r.status_code)
          print('Primi 2000 chars:')
          print(r.text[:2000])
        
      - name: Esegui controllo Hyrox
        env:
          GMAIL_USER:         ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python check_hyrox.py
